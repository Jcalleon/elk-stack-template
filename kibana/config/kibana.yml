server.host: 0.0.0.0
server.name: kibana

elasticsearch.hosts: ["https://elasticsearch:9200"]

# Kibana authenticates as the dedicated 'kibana_system' service account.
elasticsearch.username: "kibana_system"
elasticsearch.password: "${KIBANA_PASSWORD}"

elasticsearch.ssl.certificateAuthorities: ["config/certs/ca/ca.crt"]
elasticsearch.ssl.verificationMode: certificate

xpack.security.encryptionKey: "${KIBANA_ENCRYPTION_KEY}"
xpack.encryptedSavedObjects.encryptionKey: "${KIBANA_ENCRYPTION_KEY}"
xpack.reporting.encryptionKey: "${KIBANA_ENCRYPTION_KEY}"

# Kibana itself is served over plain HTTP inside the private network;
# terminate TLS at a reverse proxy if exposing it externally.
server.ssl.enabled: false
