cluster.name: "${ES_CLUSTER_NAME}"
network.host: 0.0.0.0

# Single-node dev/test cluster. For production, switch to a proper
# discovery.seed_hosts / cluster.initial_master_nodes setup across
# multiple ES nodes.
discovery.type: single-node

# ---- Security / TLS --------------------------------------------------
xpack.security.enabled: true
xpack.security.enrollment.enabled: true

xpack.security.http.ssl:
  enabled: true
  key: certs/elasticsearch/elasticsearch.key
  certificate: certs/elasticsearch/elasticsearch.crt
  certificate_authorities: certs/ca/ca.crt

xpack.security.transport.ssl:
  enabled: true
  verification_mode: certificate
  key: certs/elasticsearch/elasticsearch.key
  certificate: certs/elasticsearch/elasticsearch.crt
  certificate_authorities: certs/ca/ca.crt

xpack.license.self_generated.type: "${LICENSE}"
